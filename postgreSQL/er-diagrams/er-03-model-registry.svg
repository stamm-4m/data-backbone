<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Arial, Helvetica, sans-serif">
  <rect width="1280" height="720" fill="#f8fafc"/>

  <text x="640" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">
    3. Model registry — soft sensors, dynamic models and their outputs
  </text>
  <text x="640" y="52" text-anchor="middle" font-size="12" fill="#475569">
    Projects own a portfolio of soft sensors (data-driven) and dynamic models (ODE/hybrid); metrics and simulations are kept alongside.
  </text>

  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>

  <!-- projects (centre-top) -->
  <g transform="translate(530, 80)">
    <rect width="230" height="120" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L224,0 Q230,0 230,6 L230,32 L0,32 Z" fill="#1e3a8a"/>
    <text x="115" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">projects</text>
    <line x1="0" y1="32" x2="230" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">name TEXT</text>
    <text x="12" y="92" font-size="12" fill="#0f172a">description TEXT</text>
    <text x="12" y="112" font-size="12" fill="#0f172a">created_at TIMESTAMP</text>
  </g>

  <!-- project_soft_sensors (left junction) -->
  <g transform="translate(200, 280)">
    <rect width="240" height="110" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L234,0 Q240,0 240,6 L240,32 L0,32 Z" fill="#64748b"/>
    <text x="120" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">project_soft_sensors</text>
    <line x1="0" y1="32" x2="240" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">project_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
    <text x="12" y="92" font-size="12" fill="#0f172a">soft_sensor_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
  </g>

  <!-- project_dynamic_models (right junction) -->
  <g transform="translate(850, 280)">
    <rect width="240" height="110" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L234,0 Q240,0 240,6 L240,32 L0,32 Z" fill="#64748b"/>
    <text x="120" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">project_dynamic_models</text>
    <line x1="0" y1="32" x2="240" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">project_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
    <text x="12" y="92" font-size="12" fill="#0f172a">dynamic_model_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
  </g>

  <!-- soft_sensors -->
  <g transform="translate(40, 460)">
    <rect width="240" height="140" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L234,0 Q240,0 240,6 L240,32 L0,32 Z" fill="#1e3a8a"/>
    <text x="120" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">soft_sensors</text>
    <line x1="0" y1="32" x2="240" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">path_metadata TEXT</text>
    <text x="12" y="92" font-size="12" fill="#0f172a">path_model TEXT</text>
    <text x="12" y="120" font-size="10" fill="#64748b">UNIQUE (path_metadata,</text>
    <text x="12" y="134" font-size="10" fill="#64748b">path_model)</text>
  </g>

  <!-- soft_sensor_metrics -->
  <g transform="translate(360, 460)">
    <rect width="240" height="170" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L234,0 Q240,0 240,6 L240,32 L0,32 Z" fill="#1e3a8a"/>
    <text x="120" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">soft_sensor_metrics</text>
    <line x1="0" y1="32" x2="240" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">soft_sensor_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
    <text x="12" y="92" font-size="12" fill="#0f172a">experiment_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
    <text x="12" y="112" font-size="12" fill="#0f172a">metric_name TEXT</text>
    <text x="12" y="132" font-size="12" fill="#0f172a">metric_value DOUBLE</text>
    <text x="12" y="152" font-size="12" fill="#0f172a">description TEXT</text>
  </g>

  <!-- dynamic_model -->
  <g transform="translate(680, 460)">
    <rect width="240" height="160" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L234,0 Q240,0 240,6 L240,32 L0,32 Z" fill="#1e3a8a"/>
    <text x="120" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">dynamic_model</text>
    <line x1="0" y1="32" x2="240" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">name TEXT</text>
    <text x="12" y="92" font-size="12" fill="#0f172a">version TEXT</text>
    <text x="12" y="112" font-size="12" fill="#0f172a">url_endpoint TEXT</text>
    <text x="12" y="132" font-size="11" fill="#64748b">(descriptors for ODE /</text>
    <text x="12" y="147" font-size="11" fill="#64748b">hybrid models)</text>
  </g>

  <!-- simulations -->
  <g transform="translate(1000, 460)">
    <rect width="240" height="160" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L234,0 Q240,0 240,6 L240,32 L0,32 Z" fill="#1e3a8a"/>
    <text x="120" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">simulations</text>
    <line x1="0" y1="32" x2="240" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">dynamic_model_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
    <text x="12" y="92" font-size="12" fill="#0f172a">start_time TIMESTAMPTZ</text>
    <text x="12" y="112" font-size="12" fill="#0f172a">end_time TIMESTAMPTZ</text>
    <text x="12" y="132" font-size="12" fill="#0f172a">inputs JSONB</text>
    <text x="12" y="152" font-size="12" fill="#0f172a">results JSONB</text>
  </g>

  <!-- experiments (referenced by metrics) -->
  <g transform="translate(360, 80)">
    <rect width="170" height="80" rx="6" fill="white" stroke="#334155" stroke-dasharray="4,3"/>
    <path d="M0,6 Q0,0 6,0 L164,0 Q170,0 170,6 L170,32 L0,32 Z" fill="#94a3b8"/>
    <text x="85" y="21" text-anchor="middle" fill="white" font-size="12" font-weight="bold">experiments</text>
    <line x1="0" y1="32" x2="170" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="11" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="70" font-size="10" fill="#64748b">(see diagram 2)</text>
  </g>

  <!-- CONNECTORS -->
  <!-- projects → project_soft_sensors -->
  <path d="M560,200 C 560,240 320,240 320,280" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow3)"/>

  <!-- projects → project_dynamic_models -->
  <path d="M730,200 C 730,240 970,240 970,280" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow3)"/>

  <!-- project_soft_sensors → soft_sensors -->
  <path d="M320,390 C 320,420 160,430 160,460" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow3)"/>

  <!-- project_dynamic_models → dynamic_model -->
  <path d="M970,390 C 970,420 800,430 800,460" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow3)"/>

  <!-- soft_sensors → soft_sensor_metrics -->
  <path d="M280,540 L360,540" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow3)"/>

  <!-- dynamic_model → simulations -->
  <path d="M920,540 L1000,540" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow3)"/>

  <!-- experiments → soft_sensor_metrics.experiment_id (dashed ref) -->
  <path d="M445,160 L480,460" stroke="#334155" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow3)"/>

  <!-- Legend -->
  <g transform="translate(60, 640)">
    <rect width="1180" height="60" rx="4" fill="white" stroke="#cbd5e1"/>
    <rect x="14" y="14" width="14" height="14" fill="#1e3a8a"/>
    <text x="34" y="26" font-size="12" fill="#0f172a">Relational entity</text>
    <rect x="150" y="14" width="14" height="14" fill="#64748b"/>
    <text x="170" y="26" font-size="12" fill="#0f172a">Junction (M..N) table</text>
    <rect x="320" y="14" width="14" height="14" fill="#94a3b8"/>
    <text x="340" y="26" font-size="12" fill="#0f172a">External entity (other diagram)</text>
    <line x1="540" y1="21" x2="580" y2="21" stroke="#334155" stroke-width="1.2" stroke-dasharray="5,3"/>
    <text x="588" y="26" font-size="12" fill="#0f172a">cross-diagram FK</text>
    <text x="14" y="48" font-size="11" fill="#64748b">Each project registers a portfolio of soft sensors and dynamic models; soft-sensor performance metrics are scored per experiment.</text>
  </g>
</svg>
