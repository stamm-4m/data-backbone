<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="Arial, Helvetica, sans-serif">
  <rect width="1280" height="820" fill="#f8fafc"/>

  <text x="640" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">
    2. Operational context — projects, experiments, runs, equipment
  </text>
  <text x="640" y="52" text-anchor="middle" font-size="12" fill="#475569">
    Scientific project hierarchy linked to instrumented runs, their equipment, and human-in-the-loop annotations and alerts.
  </text>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
  </defs>

  <!-- projects -->
  <g transform="translate(60, 80)">
    <rect width="230" height="140" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L224,0 Q230,0 230,6 L230,32 L0,32 Z" fill="#1e3a8a"/>
    <text x="115" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">projects</text>
    <line x1="0" y1="32" x2="230" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">name TEXT</text>
    <text x="12" y="92" font-size="12" fill="#0f172a">description TEXT</text>
    <text x="12" y="112" font-size="12" fill="#0f172a">created_at TIMESTAMP</text>
    <text x="12" y="132" font-size="12" fill="#0f172a">stamm_modules_id UUID</text>
  </g>

  <!-- experiments -->
  <g transform="translate(380, 80)">
    <rect width="250" height="200" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L244,0 Q250,0 250,6 L250,32 L0,32 Z" fill="#1e3a8a"/>
    <text x="125" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">experiments</text>
    <line x1="0" y1="32" x2="250" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">project_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
    <text x="12" y="92" font-size="12" fill="#0f172a">name TEXT</text>
    <text x="12" y="112" font-size="12" fill="#0f172a">description TEXT</text>
    <text x="12" y="132" font-size="12" fill="#0f172a">initial_conditions JSONB</text>
    <text x="12" y="152" font-size="12" fill="#0f172a">set_points JSONB</text>
    <text x="12" y="172" font-size="12" fill="#0f172a">start_time TIMESTAMPTZ</text>
    <text x="12" y="192" font-size="12" fill="#0f172a">end_time TIMESTAMPTZ</text>
  </g>

  <!-- runs -->
  <g transform="translate(720, 80)">
    <rect width="220" height="130" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L214,0 Q220,0 220,6 L220,32 L0,32 Z" fill="#1e3a8a"/>
    <text x="110" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">runs</text>
    <line x1="0" y1="32" x2="220" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">experiment_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
    <text x="12" y="92" font-size="12" fill="#0f172a">start_time TIMESTAMP</text>
    <text x="12" y="112" font-size="12" fill="#0f172a">end_time TIMESTAMP</text>
  </g>

  <!-- experiments_equipments (junction) -->
  <g transform="translate(380, 340)">
    <rect width="250" height="110" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L244,0 Q250,0 250,6 L250,32 L0,32 Z" fill="#64748b"/>
    <text x="125" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">experiments_equipments</text>
    <line x1="0" y1="32" x2="250" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">experiment_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
    <text x="12" y="92" font-size="12" fill="#0f172a">equipment_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
  </g>

  <!-- equipments -->
  <g transform="translate(720, 340)">
    <rect width="230" height="160" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L224,0 Q230,0 230,6 L230,32 L0,32 Z" fill="#1e3a8a"/>
    <text x="115" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">equipments</text>
    <line x1="0" y1="32" x2="230" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">name TEXT</text>
    <text x="12" y="92" font-size="12" fill="#0f172a">brand TEXT</text>
    <text x="12" y="112" font-size="12" fill="#0f172a">model TEXT</text>
    <text x="12" y="132" font-size="12" fill="#0f172a">version TEXT</text>
    <text x="12" y="152" font-size="12" fill="#0f172a">created_at TIMESTAMP</text>
  </g>

  <!-- equipment_components -->
  <g transform="translate(1020, 340)">
    <rect width="230" height="130" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L224,0 Q230,0 230,6 L230,32 L0,32 Z" fill="#64748b"/>
    <text x="115" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">equipment_components</text>
    <line x1="0" y1="32" x2="230" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">equipment_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
    <text x="12" y="92" font-size="12" fill="#0f172a">sensor_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
    <text x="12" y="112" font-size="12" fill="#0f172a">actuator_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
  </g>

  <!-- sensors -->
  <g transform="translate(1020, 570)">
    <rect width="110" height="110" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L104,0 Q110,0 110,6 L110,32 L0,32 Z" fill="#1e3a8a"/>
    <text x="55" y="21" text-anchor="middle" fill="white" font-size="12" font-weight="bold">sensors</text>
    <line x1="0" y1="32" x2="110" y2="32" stroke="#334155"/>
    <text x="10" y="52" font-size="11" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan>  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="10" y="70" font-size="11" fill="#0f172a">name</text>
    <text x="10" y="86" font-size="11" fill="#0f172a">unit</text>
    <text x="10" y="102" font-size="11" fill="#0f172a">description</text>
  </g>

  <!-- actuators -->
  <g transform="translate(1140, 570)">
    <rect width="110" height="110" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L104,0 Q110,0 110,6 L110,32 L0,32 Z" fill="#1e3a8a"/>
    <text x="55" y="21" text-anchor="middle" fill="white" font-size="12" font-weight="bold">actuators</text>
    <line x1="0" y1="32" x2="110" y2="32" stroke="#334155"/>
    <text x="10" y="52" font-size="11" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan>  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="10" y="70" font-size="11" fill="#0f172a">name</text>
    <text x="10" y="86" font-size="11" fill="#0f172a">unit</text>
    <text x="10" y="102" font-size="11" fill="#0f172a">description</text>
  </g>

  <!-- annotations -->
  <g transform="translate(60, 560)">
    <rect width="230" height="140" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L224,0 Q230,0 230,6 L230,32 L0,32 Z" fill="#1e3a8a"/>
    <text x="115" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">annotations</text>
    <line x1="0" y1="32" x2="230" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">run_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
    <text x="12" y="92" font-size="12" fill="#0f172a">user_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
    <text x="12" y="112" font-size="12" fill="#0f172a">timestamp TIMESTAMPTZ</text>
    <text x="12" y="132" font-size="12" fill="#0f172a">label, description</text>
  </g>

  <!-- alerts -->
  <g transform="translate(380, 560)">
    <rect width="250" height="140" rx="6" fill="white" stroke="#334155"/>
    <path d="M0,6 Q0,0 6,0 L244,0 Q250,0 250,6 L250,32 L0,32 Z" fill="#1e3a8a"/>
    <text x="125" y="21" text-anchor="middle" fill="white" font-size="13" font-weight="bold">alerts</text>
    <line x1="0" y1="32" x2="250" y2="32" stroke="#334155"/>
    <text x="12" y="52" font-size="12" fill="#0f172a"><tspan font-weight="bold" text-decoration="underline">id</tspan> UUID  <tspan fill="#047857" font-weight="bold">PK</tspan></text>
    <text x="12" y="72" font-size="12" fill="#0f172a">experiment_id UUID  <tspan fill="#b45309" font-weight="bold">FK</tspan></text>
    <text x="12" y="92" font-size="12" fill="#0f172a">timestamp TIMESTAMPTZ</text>
    <text x="12" y="112" font-size="12" fill="#0f172a">severity, message</text>
    <text x="12" y="132" font-size="12" fill="#0f172a">status TEXT</text>
  </g>

  <!-- runs (ghost at bottom for annotation FK) -->

  <!-- CONNECTORS -->
  <!-- projects → experiments.project_id -->
  <path d="M290,150 L380,150" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>
  <text x="305" y="145" font-size="10" fill="#334155">1..N</text>

  <!-- experiments → runs.experiment_id -->
  <path d="M630,150 L720,150" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>
  <text x="645" y="145" font-size="10" fill="#334155">1..N</text>

  <!-- experiments → experiments_equipments.experiment_id -->
  <path d="M505,280 L505,340" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>

  <!-- equipments → experiments_equipments.equipment_id -->
  <path d="M720,395 L630,395" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>

  <!-- equipments → equipment_components.equipment_id -->
  <path d="M950,395 L1020,395" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>

  <!-- equipment_components → sensors -->
  <path d="M1075,470 L1075,570" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>

  <!-- equipment_components → actuators -->
  <path d="M1195,470 L1195,570" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>

  <!-- runs → annotations.run_id (curved) -->
  <path d="M830,210 C 830,400 175,400 175,560" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>

  <!-- experiments → alerts.experiment_id -->
  <path d="M505,280 C 505,420 505,540 505,560" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>

  <!-- Legend -->
  <g transform="translate(60, 730)">
    <rect width="1180" height="60" rx="4" fill="white" stroke="#cbd5e1"/>
    <rect x="14" y="14" width="14" height="14" fill="#1e3a8a"/>
    <text x="34" y="26" font-size="12" fill="#0f172a">Relational entity</text>
    <rect x="150" y="14" width="14" height="14" fill="#64748b"/>
    <text x="170" y="26" font-size="12" fill="#0f172a">Junction (M..N) table</text>
    <text x="320" y="26" font-size="12" fill="#047857" font-weight="bold">PK</text>
    <text x="348" y="26" font-size="12" fill="#0f172a">primary key</text>
    <text x="450" y="26" font-size="12" fill="#b45309" font-weight="bold">FK</text>
    <text x="478" y="26" font-size="12" fill="#0f172a">foreign key</text>
    <text x="14" y="48" font-size="11" fill="#64748b">Projects contain experiments, experiments have one-or-more runs, each run produces the time-series in diagram 1. Equipment composition is reified through junction tables.</text>
  </g>
</svg>
